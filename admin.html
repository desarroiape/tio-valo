<!DOCTYPE html>

<style>
  html { scroll-behavior: smooth; background: #0F1119; }
  body { background-color: #0F1119; }
  .atmosphere {
    background-color: #0F1119;
    background-image:
      radial-gradient(120% 80% at 85% -10%, rgba(242,106,33,0.16), transparent 60%),
      radial-gradient(90% 70% at -10% 10%, rgba(139,92,246,0.14), transparent 55%);
    background-attachment: fixed;
  }
  .notch { border-radius: 18px; }
  .btn-red { border-radius: 12px; }
  .layer-shadow {
    box-shadow: 0 1px 0 rgba(238,240,246,0.05) inset, 0 18px 40px -20px rgba(0,0,0,0.85), 0 0 0 1px rgba(44,49,69,0.9);
  }

  .fade-up { animation: fadeUp .6s cubic-bezier(.2,.9,.25,1) both; }

  input, select, textarea { color-scheme: dark; }
</style>

<body class="font-body text-cream antialiased atmosphere">

<header class="sticky top-0 z-40 border-b border-line/70 bg-ink/80 backdrop-blur-md">
  <div class="mx-auto flex max-w-5xl items-center justify-between px-5 py-4">
    <a href="/" class="group flex items-center gap-3">
      <span class="grid h-10 w-10 place-items-center overflow-hidden rounded-xl ring-1 ring-red/40">
        <img src="logotrustifymarket.jpeg" alt="Trustify Market" class="h-full w-full scale-[1.08] object-cover" />
      </span>
      <span class="flex flex-col leading-none">
        <span class="font-display text-lg font-800 tracking-tight text-cream">Trustify <span class="text-red">Market</span></span>
        <span class="mt-0.5 font-mono text-[9px] font-700 uppercase tracking-[0.42em] text-mint">panel admin</span>
      </span>
    </a>
    <button id="logout-btn" class="hidden font-cond text-xs font-600 uppercase tracking-[0.14em] text-muted hover:text-red">Cerrar sesión</button>
  </div>
</header>

<main class="relative z-10 mx-auto max-w-5xl px-5 py-10">

  <!-- LOGIN -->
  <section id="login-view" class="mx-auto hidden max-w-sm">
    <div class="fade-up border border-line/70 bg-surface/60 p-7 notch layer-shadow">
      <h1 class="font-display text-2xl font-800 uppercase text-cream">Acceso del dueño</h1>
      <p class="mt-1 mb-6 text-sm text-muted">Introduce la contraseña para gestionar el catálogo.</p>
      <form id="login-form">
        <label class="mb-1.5 block font-mono text-[11px] uppercase tracking-[0.18em] text-muted">Contraseña</label>
        <input id="login-pass" type="password" autocomplete="current-password" required
               class="w-full border border-line bg-ink px-3 py-2.5 text-sm text-cream focus:border-red focus:outline-none" />
        <div id="login-status" class="mt-3 hidden text-sm"></div>
        <button type="submit" class="cta mt-5 flex w-full items-center justify-center bg-red px-6 py-3 font-cond text-sm font-700 uppercase tracking-[0.14em] text-ink btn-red hover:bg-red-dim">Entrar</button>
      </form>
    </div>
  </section>

  <!-- PANEL -->
  <section id="panel-view" class="hidden">
    <div class="grid gap-8 lg:grid-cols-[1fr_1.1fr]">

      <!-- Crear cuenta -->
      <div class="fade-up border border-line/70 bg-surface/60 p-6 notch layer-shadow">
        <h2 id="form-title" class="mb-1 font-cond text-lg font-600 uppercase tracking-[0.14em] text-cream">Publicar cuenta</h2>
        <p id="form-subtitle" class="mb-5 text-sm text-muted">Se mostrará en el catálogo al guardarla.</p>
        <form id="create-form">

            <div class="sm:col-span-2">
              <label class="mb-1.5 block font-mono text-[11px] uppercase tracking-[0.18em] text-muted">Juego <span class="text-red">*</span></label>
              <select id="f-juego" name="juego" class="w-full border border-line bg-ink px-3 py-2.5 text-sm text-cream focus:border-red focus:outline-none">
                <option value="valorant">Valorant</option>
                <option value="fortnite">Fortnite</option>
              </select>
            </div>
            <div class="sm:col-span-2">
              <label class="mb-1.5 block font-mono text-[11px] uppercase tracking-[0.18em] text-muted">Título <span class="text-red">*</span></label>
              <input name="titulo" type="text" required placeholder="Ej. Cuenta Inmortal — Reaver Vandal" class="w-full border border-line bg-ink px-3 py-2.5 text-sm text-cream placeholder:text-muted/60 focus:border-red focus:outline-none" />

            <div class="sm:col-span-2">
              <label class="mb-1.5 block font-mono text-[11px] uppercase tracking-[0.18em] text-muted">ID <span class="text-red">*</span> <span class="text-muted/60">(lo pones vos a mano)</span></label>

                </div>
                <div>
                  <label class="mb-1.5 block font-mono text-[11px] uppercase tracking-[0.18em] text-muted">País</label>

            <!-- Campos de Fortnite -->

              <div class="grid gap-4 sm:grid-cols-2">
                <div>

                  <select name="plataforma" class="w-full border border-line bg-ink px-3 py-2.5 text-sm text-cream focus:border-red focus:outline-none">
                    <option>PC</option><option>PlayStation</option><option>Xbox</option><option>Nintendo Switch</option><option>Móvil</option><option>Cross-platform</option>

                </div>
                <div>

                  <input name="nivel" type="number" min="0" placeholder="Ej. 120" class="w-full border border-line bg-ink px-3 py-2.5 text-sm text-cream placeholder:text-muted/60 focus:border-red focus:outline-none" />
                </div>
                <div>
                  <label class="mb-1.5 block font-mono text-[11px] uppercase tracking-[0.18em] text-muted">Pavos (V-Bucks)</label>
                  <input name="pavos" type="number" min="0" placeholder="Ej. 2000" class="w-full border border-line bg-ink px-3 py-2.5 text-sm text-cream placeholder:text-muted/60 focus:border-red focus:outline-none" />
                </div>
                <div class="flex items-center gap-2 pt-7">
                  <input id="f-og" name="og" type="checkbox" value="1" class="h-4 w-4 accent-red" />
                  <label for="f-og" class="font-mono text-[11px] uppercase tracking-[0.18em] text-muted">¿Es cuenta OG?</label>

            </div>
            <div>

              <input name="precio" type="number" min="0" placeholder="Ej. 120" class="w-full border border-line bg-ink px-3 py-2.5 text-sm text-cream placeholder:text-muted/60 focus:border-red focus:outline-none" />

            </div>
            <div class="sm:col-span-2">
              <label class="mb-1.5 block font-mono text-[11px] uppercase tracking-[0.18em] text-muted">Correo</label>

                <option>Correo original incluido</option>
                <option>Correo cambiable por uno nuevo</option>

            </div>
            <div class="sm:col-span-2">

            </div>
            <div class="sm:col-span-2">
              <label class="mb-1.5 block font-mono text-[11px] uppercase tracking-[0.18em] text-muted">Etiquetas destacadas <span class="text-muted/60">(clic para agregar · escribe una nueva)</span></label>

              <span id="foto-count" class="font-mono text-[10px] text-mint"></span>

            <div id="drop-zone" tabindex="0" role="button" aria-label="Subir fotos"

              <p class="mt-1 font-mono text-[10px] uppercase tracking-wider text-muted">PNG · JPG · WEBP — hasta 12</p>
            </div>
            <input id="foto-input" type="file" accept="image/*" multiple class="hidden" />
            <div id="preview-grid" class="mt-3 grid grid-cols-4 gap-2 sm:grid-cols-6"></div>
          </div>

          <div id="create-status" class="mt-4 hidden text-sm"></div>
          <div class="mt-4 flex gap-2">
            <button id="create-submit" type="submit" class="cta flex flex-1 items-center justify-center bg-red px-6 py-3.5 font-cond text-sm font-700 uppercase tracking-[0.14em] text-ink btn-red hover:bg-red-dim disabled:cursor-not-allowed disabled:opacity-60">Publicar cuenta</button>
            <button id="edit-cancel" type="button" class="hidden rounded border border-line px-5 font-cond text-xs font-600 uppercase tracking-[0.14em] text-muted hover:border-red hover:text-red">Cancelar</button>
          </div>
        </form>
      </div>

      <!-- Lista de cuentas -->
      <div class="fade-up">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="font-cond text-lg font-600 uppercase tracking-[0.14em] text-cream">Cuentas publicadas</h2>
          <span id="lista-count" class="font-mono text-[11px] text-muted"></span>

        <div id="lista" class="grid gap-3"></div>

    </div>

<script>
const CONFIG = { maxFiles: 12, compressMaxDim: 1600, compressQuality: 0.82 };

const $ = s => document.querySelector(s);
const loginView = $('#login-view'), panelView = $('#panel-view'), logoutBtn = $('#logout-btn');

function setStatus(el, msg, type) {
  const styles = { err: 'text-red', ok: 'text-mint', info: 'text-muted' };
  el.className = (styles[type] || styles.info) + ' text-sm';
  el.textContent = msg;
  el.classList.remove('hidden');
}
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function api(path, opts = {}) {
  const res = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  return { status: res.status, data };
}

/* ---------- Sesión ---------- */
async function comprobarSesion() {
  const { status, data } = await api('/api/admin/cuentas');
  if (status === 200) { mostrarPanel(data.cuentas || []); }
  else { mostrarLogin(); }
}
function mostrarLogin() {
  loginView.classList.remove('hidden');
  panelView.classList.add('hidden');
  logoutBtn.classList.add('hidden');
  $('#login-pass').focus();
}
function mostrarPanel(cuentas) {
  loginView.classList.add('hidden');
  panelView.classList.remove('hidden');
  logoutBtn.classList.remove('hidden');
  renderLista(cuentas);
}

$('#login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const { status, data } = await api('/api/admin/login', {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ password: $('#login-pass').value }),
  });
  if (status === 200) { $('#login-pass').value = ''; comprobarSesion(); }
  else { setStatus($('#login-status'), data.error || 'No se pudo entrar', 'err'); }
});

logoutBtn.addEventListener('click', async () => {
  await api('/api/admin/logout', { method: 'POST' });
  mostrarLogin();
});

/* ---------- Imágenes ---------- */
const dropZone = $('#drop-zone'), fileInput = $('#foto-input'), previewGrid = $('#preview-grid'), fotoCount = $('#foto-count');
let fotos = [];

function renderPreviews() {
  previewGrid.innerHTML = fotos.map((f, i) => `
    <figure class="group relative overflow-hidden rounded-lg border border-line/70 bg-ink">
      <img src="${f.url}" class="aspect-square w-full object-cover" />
      <button type="button" data-rm="${i}" aria-label="Quitar" class="absolute right-1 top-1 grid h-5 w-5 place-items-center rounded bg-ink/85 text-cream hover:bg-red hover:text-ink">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </figure>`).join('');
  fotoCount.textContent = fotos.length ? `${fotos.length} / ${CONFIG.maxFiles}` : '';
}
function addFiles(list) {
  for (const file of list) {
    if (!file.type.startsWith('image/')) continue;
    if (fotos.length >= CONFIG.maxFiles) break;
    fotos.push({ file, url: URL.createObjectURL(file) });
  }
  renderPreviews();
}
previewGrid.addEventListener('click', e => {
  const b = e.target.closest('[data-rm]'); if (!b) return;
  const i = +b.dataset.rm; URL.revokeObjectURL(fotos[i].url); fotos.splice(i, 1); renderPreviews();
});
fileInput.addEventListener('change', e => { addFiles(e.target.files); fileInput.value = ''; });
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); } });
['dragenter','dragover'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('drop-active'); }));
['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('drop-active'); }));
dropZone.addEventListener('drop', e => addFiles(e.dataTransfer.files));

async function compressImage(file) {
  try {
    const bmp = await createImageBitmap(file);
    const scale = Math.min(1, CONFIG.compressMaxDim / Math.max(bmp.width, bmp.height));
    const w = Math.max(1, Math.round(bmp.width * scale)), h = Math.max(1, Math.round(bmp.height * scale));
    const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h); ctx.drawImage(bmp, 0, 0, w, h); bmp.close?.();
    return cv.toDataURL('image/jpeg', CONFIG.compressQuality);
  } catch {
    return await new Promise((ok, no) => { const r = new FileReader(); r.onload = () => ok(r.result); r.onerror = no; r.readAsDataURL(file); });
  }
}

/* ---------- Crear cuenta ---------- */
const createForm = $('#create-form'), createBtn = $('#create-submit'), createStatus = $('#create-status');
const juegoSel = $('#f-juego');
function actualizarCamposJuego() {
  const ft = juegoSel.value === 'fortnite';
  document.querySelector('.campo-valorant').classList.toggle('hidden', ft);
  document.querySelector('.campo-fortnite').classList.toggle('hidden', !ft);
}
juegoSel.addEventListener('change', actualizarCamposJuego);
actualizarCamposJuego();

// Etiquetas destacadas (clic para agregar)
const ETIQUETAS = [
  'Vandal Exelio', 'Cuenta chetada', 'Cuenta verificada', 'Exclusiva', 'Cuenta económica',
  'Unranked - sin skins', 'Skins beta', 'Sheriff Neo Frontier', 'Skins RGX', 'Skins Soberanas',
  'Vandal Araxys', 'Pack Arcane', 'Vandal Kuronami', 'Cuchillo Xenocazador', 'Packs Champions todo',
  'Vandal Evori', 'Skins VCT', 'Cuchillo Ignite',
];
const etiquetasCont = document.getElementById('etiquetas');
const etiquetaNueva = document.getElementById('etiqueta-nueva');
const etiquetaAdd = document.getElementById('etiqueta-add');

function setChipState(b, on) {
  b.classList.toggle('is-on', on);
  b.classList.toggle('border-red', on);
  b.classList.toggle('bg-red/10', on);
  b.classList.toggle('text-cream', on);
  b.classList.toggle('border-line', !on);
  b.classList.toggle('text-cream/70', !on);
  b.classList.toggle('hover:border-red', !on);
  b.classList.toggle('hover:text-cream', !on);
}
function makeChip(tag, selected) {
  const b = document.createElement('button');
  b.type = 'button';
  b.dataset.tag = tag;
  b.textContent = tag;
  b.className = 'rounded-lg border px-2.5 py-1.5 text-xs transition';
  setChipState(b, !!selected);
  return b;
}
function chipPorTag(tag) {
  return [...etiquetasCont.querySelectorAll('[data-tag]')].find(b => b.dataset.tag === tag);
}
function renderEtiquetas() {
  etiquetasCont.innerHTML = '';
  ETIQUETAS.forEach(t => etiquetasCont.appendChild(makeChip(t, false)));
}
renderEtiquetas();

etiquetasCont.addEventListener('click', e => {
  const b = e.target.closest('[data-tag]'); if (!b) return;
  setChipState(b, !b.classList.contains('is-on'));
});

// Marca la etiqueta; si no existe, crea un chip solo para esta publicación.
function activarEtiqueta(tag) {
  let chip = chipPorTag(tag);
  if (!chip) {
    chip = makeChip(tag, true);
    chip.dataset.adhoc = '1';
    etiquetasCont.appendChild(chip);
  } else {
    setChipState(chip, true);
  }
  return chip;
}
function agregarEtiquetaNueva() {
  const tag = (etiquetaNueva.value || '').trim().replace(/\s+/g, ' ');
  if (!tag) return;
  activarEtiqueta(tag);
  etiquetaNueva.value = '';
  etiquetaNueva.focus();
}
etiquetaAdd.addEventListener('click', agregarEtiquetaNueva);
etiquetaNueva.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); agregarEtiquetaNueva(); }
});

function etiquetasSeleccionadas() {
  return [...etiquetasCont.querySelectorAll('.is-on')].map(b => b.dataset.tag);
}
function limpiarEtiquetas() {
  etiquetasCont.querySelectorAll('[data-adhoc]').forEach(b => b.remove());
  etiquetasCont.querySelectorAll('.is-on').forEach(b => setChipState(b, false));
}

// Agentes: muestra el campo de detalle cuando se elige "Editar"
const agentesSel = document.getElementById('f-agentes');
const agentesEditar = document.getElementById('agentes-editar');
agentesSel.addEventListener('change', () => agentesEditar.classList.toggle('hidden', agentesSel.value !== '__editar__'));

// Rangos con niveles I / II / III (Radiante y Sin rango no llevan nivel)
const RANGOS_TIER = ['Hierro', 'Bronce', 'Plata', 'Oro', 'Platino', 'Diamante', 'Ascendente', 'Inmortal'];
function opcionesRango(conVacio) {
  let o = conVacio ? '<option value="">—</option>' : '<option>Sin rango / Unranked</option>';
  for (const t of RANGOS_TIER) for (const n of ['I', 'II', 'III']) o += `<option>${t} ${n}</option>`;
  o += '<option>Radiante</option>';
  return o;
}
document.getElementById('f-rango').innerHTML = opcionesRango(false);
document.getElementById('f-rango-max').innerHTML = opcionesRango(true);

let editandoId = null;
const editCancelBtn = document.getElementById('edit-cancel');

function admNumOrNull(v) { return v != null && v !== '' && !Number.isNaN(Number(v)) ? Number(v) : null; }

// Construye el objeto de cambios (PATCH) con los tipos correctos. No incluye
// descripcion para no borrar la existente (el formulario no la edita).
function construirPatch(fields, urls) {
  const ft = fields.juego === 'fortnite';
  return {
    juego: ft ? 'fortnite' : 'valorant',
    titulo: String(fields.titulo || '').trim(),
    codigo: String(fields.codigo || '').trim(),
    precio: admNumOrNull(fields.precio),
    skins: admNumOrNull(fields.skins),
    destacadas: fields.destacadas || null,
    correo: fields.correo || null,
    link: fields.link ? String(fields.link).trim() : null,
    rango: ft ? null : (fields.rango || null),
    region: ft ? null : (fields.region || null),
    pais: ft ? null : (fields.pais || null),
    rango_maximo: ft ? null : (fields.rango_maximo || null),
    agentes: ft ? null : (fields.agentes || null),
    plataforma: ft ? (fields.plataforma || null) : null,
    nivel: ft ? admNumOrNull(fields.nivel) : null,
    pavos: ft ? admNumOrNull(fields.pavos) : null,
    og: ft ? !!fields.og : false,
    recibos: !!fields.recibos,
    recuperacion: !!fields.recuperacion,
    imagenes: urls,
  };
}

function setVal(name, value) { const el = createForm.elements[name]; if (el) el.value = value ?? ''; }

function entrarEdicion(c) {
  editandoId = c.id;
  const ft = c.juego === 'fortnite';
  juegoSel.value = ft ? 'fortnite' : 'valorant';
  actualizarCamposJuego();
  setVal('titulo', c.titulo);
  setVal('codigo', (c.codigo && String(c.codigo).trim()) ? c.codigo : '');
  setVal('precio', c.precio ?? '');
  setVal('skins', c.skins ?? '');
  setVal('correo', c.correo || '');
  setVal('link', c.link || '');
  if (ft) {
    setVal('plataforma', c.plataforma || 'PC');
    setVal('nivel', c.nivel ?? '');
    setVal('pavos', c.pavos ?? '');
    document.getElementById('f-og').checked = !!c.og;
  } else {
    setVal('region', c.region || 'LATAM');
    setVal('pais', c.pais || '');
    setVal('rango', c.rango || '');
    setVal('rango_maximo', c.rango_maximo || '');
    if (c.agentes === 'Todos los agentes' || c.agentes === 'Agentes principales') {
      agentesSel.value = c.agentes; agentesEditar.classList.add('hidden');
    } else if (c.agentes) {
      agentesSel.value = '__editar__'; agentesEditar.classList.remove('hidden');
      document.getElementById('f-agentes-custom').value = c.agentes;
    } else {
      agentesSel.value = 'Todos los agentes'; agentesEditar.classList.add('hidden');
    }
  }
  createForm.elements['recibos'].checked = !!c.recibos;
  createForm.elements['recuperacion'].checked = !!c.recuperacion;
  limpiarEtiquetas();
  const dest = String(c.destacadas || '').split(/[,·]/).map(s => s.trim()).filter(Boolean);
  dest.forEach(tag => activarEtiqueta(tag));
  fotos.forEach(f => { if (!f.remote) URL.revokeObjectURL(f.url); });
  fotos = (Array.isArray(c.imagenes) ? c.imagenes : []).filter(Boolean).map(url => ({ url, remote: true }));
  renderPreviews();
  document.getElementById('form-title').textContent = 'Modificar cuenta';
  document.getElementById('form-subtitle').textContent = 'Los cambios solo se ven en la web. No se reenvían los anuncios.';
  createBtn.textContent = 'Guardar cambios';
  editCancelBtn.classList.remove('hidden');
  createStatus.classList.add('hidden');
  createForm.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function salirEdicion() {
  editandoId = null;
  createForm.reset();
  actualizarCamposJuego();
  limpiarEtiquetas();
  agentesEditar.classList.add('hidden');
  fotos.forEach(f => { if (!f.remote) URL.revokeObjectURL(f.url); });
  fotos = []; renderPreviews();
  document.getElementById('form-title').textContent = 'Publicar cuenta';
  document.getElementById('form-subtitle').textContent = 'Se mostrará en el catálogo al guardarla.';
  createBtn.textContent = 'Publicar cuenta';
  editCancelBtn.classList.add('hidden');
}

editCancelBtn.addEventListener('click', () => { salirEdicion(); setStatus(createStatus, 'Edición cancelada.', 'info'); });

createForm.addEventListener('submit', async e => {
  e.preventDefault();
  if (!createForm.reportValidity()) return;
  const fields = Object.fromEntries(new FormData(createForm));
  fields.destacadas = etiquetasSeleccionadas().join(', ');
  if (juegoSel.value === 'fortnite') {
    delete fields.rango_maximo; delete fields.agentes;
  } else {
    fields.agentes = agentesSel.value === '__editar__' ? (document.getElementById('f-agentes-custom').value || '').trim() : agentesSel.value;
  }
  createBtn.disabled = true;
  createBtn.textContent = editandoId ? 'Guardando…' : 'Publicando…';
  try {
    // Sube fotos nuevas; conserva las existentes (en edición).
    const urls = [];
    for (let i = 0; i < fotos.length; i++) {
      if (fotos[i].remote) { urls.push(fotos[i].url); continue; }
      setStatus(createStatus, `Subiendo foto ${i + 1} de ${fotos.length}…`, 'info');
      const dataUrl = await compressImage(fotos[i].file);
      const { status, data } = await api('/api/admin/upload', {
        method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ dataUrl }),
      });
      if (status !== 200) throw new Error(data.error || 'Error subiendo imagen');
      urls.push(data.url);
    }
    if (editandoId) {
      setStatus(createStatus, 'Guardando cambios…', 'info');
      const patch = construirPatch(fields, urls);
      const { status, data } = await api('/api/admin/cuentas', {
        method: 'PATCH', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ id: editandoId, patch }),
      });
      if (status !== 200) throw new Error(data.error || 'Error guardando');
      setStatus(createStatus, '¡Cambios guardados! (no se reenviaron anuncios)', 'ok');
    } else {
      setStatus(createStatus, 'Guardando cuenta…', 'info');
      const { status, data } = await api('/api/admin/cuentas', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ ...fields, imagenes: urls }),
      });
      if (status !== 200) throw new Error(data.error || 'Error guardando');
      setStatus(createStatus, '¡Cuenta publicada!', 'ok');
    }
    salirEdicion();
    recargarLista();
  } catch (err) {
    setStatus(createStatus, 'Error: ' + (err.message || err), 'err');
  } finally {
    createBtn.disabled = false; createBtn.textContent = editandoId ? 'Guardar cambios' : 'Publicar cuenta';
  }
});

/* ---------- Lista / gestión ---------- */
const lista = $('#lista');
function badge(estado) {
  const map = { disponible: 'text-mint', vendida: 'text-red', oculta: 'text-muted' };
  return `<span class="font-mono text-[10px] uppercase tracking-wider ${map[estado] || 'text-muted'}">${estado}</span>`;
}
function renderLista(cuentas) {
  CUENTAS = cuentas; // guarda la lista actual para Modificar / anunciar
  $('#lista-count').textContent = `${cuentas.length} en total`;
  if (!cuentas.length) { lista.innerHTML = `<p class="text-sm text-muted">Aún no has publicado cuentas.</p>`; return; }
  lista.innerHTML = cuentas.map(c => {
    const img = (c.imagenes && c.imagenes[0]) || 'https://placehold.co/120x120/181B27/8A93AC?text=—';
    const ft = c.juego === 'fortnite';
    const codigo = (c.codigo && String(c.codigo).trim()) ? c.codigo : ((ft ? 'FN-' : 'VAL-') + String(c.id).padStart(3, '0'));
    const juegoTxt = ft ? 'Fortnite' : 'Valorant';
    const meta = ft
      ? `${esc(c.plataforma || '—')} · Nivel ${c.nivel ?? '—'} · ${c.pavos ?? 0} pavos`
      : `${esc(c.rango || '—')} · ${esc(c.region || '—')}`;
    return `
    <div class="flex items-center gap-3 border border-line/70 bg-surface/60 p-3 notch" data-id="${c.id}">
      <img src="${esc(img)}" class="h-14 w-14 shrink-0 rounded-lg object-cover ring-1 ring-line/70" />
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2">
          <span class="font-mono text-[10px] uppercase tracking-wider text-muted">${codigo}</span>
          <span class="rounded bg-line/60 px-1.5 py-0.5 font-mono text-[9px] uppercase tracking-wider text-cream/70">${juegoTxt}</span>
          ${badge(c.estado)}
        </div>
        <p class="truncate font-cond text-sm font-600 uppercase tracking-wide text-cream">${esc(c.titulo)}</p>
        <p class="font-mono text-[11px] text-muted">${meta} · <span class="text-red">$${c.precio ?? 0}</span></p>
      </div>
      <div class="flex shrink-0 flex-col gap-1.5">
        <button data-edit="${c.id}" class="rounded border border-line px-2.5 py-1 font-cond text-[10px] font-600 uppercase tracking-wider text-cream/80 hover:border-gold hover:text-gold">Modificar</button>
        <button data-announce="${c.id}" class="rounded border border-line px-2.5 py-1 font-cond text-[10px] font-600 uppercase tracking-wider text-cream/80 hover:border-mint hover:text-mint">Subir a TG/Discord</button>
        <button data-toggle="${c.id}" data-estado="${c.estado}" class="rounded border border-line px-2.5 py-1 font-cond text-[10px] font-600 uppercase tracking-wider text-cream/80 hover:border-mint hover:text-mint">
          ${c.estado === 'disponible' ? 'Marcar vendida' : 'Marcar disponible'}
        </button>
        <button data-del="${c.id}" class="rounded border border-line px-2.5 py-1 font-cond text-[10px] font-600 uppercase tracking-wider text-cream/80 hover:border-red hover:text-red">Borrar</button>
      </div>
    </div>`;
  }).join('');
}
let CUENTAS = [];
async function recargarLista() {
  const { status, data } = await api('/api/admin/cuentas');
  if (status === 200) { CUENTAS = data.cuentas || []; renderLista(CUENTAS); }
  else mostrarLogin();
}
lista.addEventListener('click', async e => {
  const tgl = e.target.closest('[data-toggle]');
  const del = e.target.closest('[data-del]');
  const edit = e.target.closest('[data-edit]');
  const ann = e.target.closest('[data-announce]');
  if (edit) {
    const c = CUENTAS.find(x => String(x.id) === edit.dataset.edit);
    if (c) entrarEdicion(c);
    return;
  }
  if (ann) {
    if (!confirm('¿Subir esta cuenta a Telegram y Discord ahora?')) return;
    ann.disabled = true; const t = ann.textContent; ann.textContent = 'Enviando…';
    const { status, data } = await api('/api/admin/cuentas', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ accion: 'anunciar', id: ann.dataset.announce }),
    });
    ann.disabled = false; ann.textContent = t;
    if (status === 200 && data.ok) {
      const oks = [data.discord && 'Discord', data.telegram && 'Telegram'].filter(Boolean).join(' y ');
      const errs = (data.errores || []).length ? '\n\nErrores:\n' + data.errores.join('\n') : '';
      alert(oks ? ('✅ Anunciado en ' + oks + errs) : ('No se pudo anunciar.' + errs));
    } else {
      alert('Error: ' + (data.error || status));
    }
    return;
  }
  if (tgl) {
    const nuevo = tgl.dataset.estado === 'disponible' ? 'vendida' : 'disponible';
    tgl.disabled = true;
    await api('/api/admin/cuentas', { method: 'PATCH', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ id: tgl.dataset.toggle, patch: { estado: nuevo } }) });
    recargarLista();
  }
  if (del) {
    if (!confirm('¿Borrar esta cuenta? Esta acción no se puede deshacer.')) return;
    del.disabled = true;
    await api('/api/admin/cuentas?id=' + encodeURIComponent(del.dataset.del), { method: 'DELETE' });
    recargarLista();
  }
});

comprobarSesion();
</script>
</body>
